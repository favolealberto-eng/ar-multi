<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR Dashboard Dinamica (Endpoint URL)</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <canvas id="canvas-macchina" width="1600" height="900" style="display:none;"></canvas>
    <canvas id="canvas-iaq" width="1600" height="900" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true;">
      
      <a-marker type="barcode" value="0" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-macchina" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-macchina; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-marker type="barcode" value="1" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-iaq" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-iaq; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>
<script>
      // ==========================================
      // 1. INSERISCI QUI GLI URL DEGLI ENDPOINT
      // ==========================================
      const ENDPOINT_MACCHINA = "http://192.168.37.201:1880/api/device/0"; // Esempio: "http://192.168.1.xxx:8080/api/device/0"
      const ENDPOINT_IAQ = "http://192.168.37.201:1880/api/device/1";      // Esempio: "http://192.168.1.xxx:8080/api/device/1"

      const ctxMacchina = document.getElementById('canvas-macchina').getContext('2d');
      const ctxIaq = document.getElementById('canvas-iaq').getContext('2d');

      // ==========================================
      // 2. FUNZIONE DI EMERGENZA (Pannello di Attesa)
      // ==========================================
      function disegnaPannelloAttesa(ctx, titolo, planeId) {
          ctx.fillStyle = '#0f172a'; // Sfondo blu scuro
          ctx.fillRect(0, 0, 1600, 900);

          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 70px sans-serif';
          ctx.fillText(titolo, 80, 120);

          // Testo di avviso giallo
          ctx.fillStyle = '#facc15'; 
          ctx.font = 'italic 50px sans-serif';
          ctx.fillText('Nessun dato in arrivo. In attesa del Server...', 80, 450);
          ctx.fillText('Verificare che l\'URL dell\'Endpoint sia inserito nel codice.', 80, 530);

          const plane = document.getElementById(planeId);
          if(plane && plane.getObject3D('mesh')) {
              plane.getObject3D('mesh').material.map.needsUpdate = true;
          }
      }

      // ==========================================
      // 3. FUNZIONE GENERATRICE DELLA GRIGLIA DINAMICA
      // ==========================================
      function disegnaGrigliaDinamica(ctx, datiArray, titoloPannello, planeId) {
          ctx.fillStyle = '#0f172a';
          ctx.fillRect(0, 0, 1600, 900);

          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 70px sans-serif';
          ctx.fillText(titoloPannello, 80, 120);

          const startX = 80, startY = 180, boxW = 330, boxH = 200, gapX = 40, gapY = 40;
          const maxElements = Math.min(datiArray.length, 12);

          for (let i = 0; i < maxElements; i++) {
              const item = datiArray[i];
              let nomeVariabile = item.name || "N/D";
              nomeVariabile = nomeVariabile.replace(/_/g, ' '); 
              if(nomeVariabile.length > 18) nomeVariabile = nomeVariabile.substring(0, 16) + '...';

              let valore = item.value;
              if (typeof valore === 'number') valore = valore.toFixed(1);

              const colonna = i % 4; 
              const riga = Math.floor(i / 4); 
              const x = startX + colonna * (boxW + gapX);
              const y = startY + riga * (boxH + gapY);

              ctx.fillStyle = '#1e293b';
              ctx.beginPath();
              ctx.roundRect(x, y, boxW, boxH, 20);
              ctx.fill();

              ctx.fillStyle = '#94a3b8';
              ctx.font = '24px sans-serif';
              ctx.fillText(nomeVariabile, x + 25, y + 50);

              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 70px monospace';
              ctx.fillText(valore, x + 25, y + 140);
          }

          const plane = document.getElementById(planeId);
          if(plane && plane.getObject3D('mesh')) {
              plane.getObject3D('mesh').material.map.needsUpdate = true;
          }
      }

      // ==========================================
      // 4. IL MOTORE DI RETE: INTERROGA GLI ENDPOINT
      // ==========================================
      async function scaricaDatiDaEndpoint() {
          
          // --- DEVICE 0 ---
          if (ENDPOINT_MACCHINA !== "") {
              try {
                  const risposta = await fetch(ENDPOINT_MACCHINA);
                  if(!risposta.ok) throw new Error("Errore Server");
                  const dati = await risposta.json();
                  disegnaGrigliaDinamica(ctxMacchina, dati, 'CENTRALE TERMICA - DEVICE 0', 'plane-macchina');
              } catch (errore) {
                  disegnaPannelloAttesa(ctxMacchina, 'CENTRALE TERMICA - DEVICE 0 (Errore di Rete)', 'plane-macchina');
              }
          } else {
              // Se l'URL è vuoto (""), disegna il pannello di attesa invece di lasciare tutto invisibile
              disegnaPannelloAttesa(ctxMacchina, 'CENTRALE TERMICA - DEVICE 0', 'plane-macchina');
          }

          // --- DEVICE 1 ---
          if (ENDPOINT_IAQ !== "") {
              try {
                  const risposta = await fetch(ENDPOINT_IAQ);
                  if(!risposta.ok) throw new Error("Errore Server");
                  const json = await risposta.json();
                  const dati = json.message.signals;
                  disegnaGrigliaDinamica(ctxIaq, dati, 'MONITORAGGIO IAQ - DEVICE 1', 'plane-iaq');
              } catch (errore) {
                  disegnaPannelloAttesa(ctxIaq, 'MONITORAGGIO IAQ - DEVICE 1 (Errore di Rete)', 'plane-iaq');
              }
          } else {
              disegnaPannelloAttesa(ctxIaq, 'MONITORAGGIO IAQ - DEVICE 1', 'plane-iaq');
          }
      }

      setInterval(scaricaDatiDaEndpoint, 3000);
      scaricaDatiDaEndpoint();

    </script>
  </body>
</html>
