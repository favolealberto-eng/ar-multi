<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR Dashboard Dinamica (Endpoint URL)</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <canvas id="canvas-macchina" width="1600" height="900" style="display:none;"></canvas>
    <canvas id="canvas-iaq" width="1600" height="900" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true;">
      
      <a-marker type="barcode" value="0" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-macchina" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-macchina; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-marker type="barcode" value="1" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-iaq" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-iaq; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
      // ==========================================
      // 1. INSERISCI QUI GLI URL DEGLI ENDPOINT
      // ==========================================
      const ENDPOINT_0 = "http://192.168.37.201:1880/api/device/0"; // Esempio: "http://192.168.1.100:8080/api/device/0"
      const ENDPOINT_1 = "http://192.168.37.201:1880/api/device/1";      // Esempio: "http://192.168.1.100:8080/api/device/1"

      const ctxMacchina = document.getElementById('canvas-macchina').getContext('2d');
      const ctxIaq = document.getElementById('canvas-iaq').getContext('2d');

      // ==========================================
      // 2. FUNZIONE GENERATRICE DELLA GRIGLIA DINAMICA
      // ==========================================
      // Questa funzione prende un array di dati e lo trasforma automaticamente in box a schermo
      function disegnaGrigliaDinamica(ctx, datiArray, titoloPannello, planeId) {
          
          // Sfondo scuro per il pannello
          ctx.fillStyle = '#0f172a';
          ctx.fillRect(0, 0, 1600, 900);

          // Disegna il titolo in alto
          ctx.fillStyle = '#ffffff';
          ctx.font = 'bold 70px sans-serif';
          ctx.fillText(titoloPannello, 80, 120);

          // Impostazioni geometriche della griglia (4 Colonne x 3 Righe max)
          const startX = 80;
          const startY = 180;
          const boxW = 330;  // Larghezza del singolo quadratino
          const boxH = 200;  // Altezza del singolo quadratino
          const gapX = 40;   // Spazio orizzontale tra i box
          const gapY = 40;   // Spazio verticale tra i box

          // Limitiamo a un massimo di 12 elementi per non sbordare dalla tela 1600x900
          const maxElements = Math.min(datiArray.length, 12);

          for (let i = 0; i < maxElements; i++) {
              const item = datiArray[i];
              
              // Estrapola il nome e puliscilo (sostituisce gli underscore con spazi per estetica)
              let nomeVariabile = item.name || "N/D";
              nomeVariabile = nomeVariabile.replace(/_/g, ' '); 
              
              // Se il nome fornito dal backend è troppo lungo, lo tronchiamo con i puntini
              if(nomeVariabile.length > 18) {
                  nomeVariabile = nomeVariabile.substring(0, 16) + '...';
              }

              // Estrapola il valore e lo formatta a un decimale se è un numero
              let valore = item.value;
              if (typeof valore === 'number') {
                  valore = valore.toFixed(1);
              }

              // ALGORITMO DI IMPAGINAZIONE (Calcola Riga e Colonna)
              const colonna = i % 4; // 0, 1, 2, 3
              const riga = Math.floor(i / 4); // 0, 1, 2...

              // Calcolo coordinate X e Y in base a riga e colonna
              const x = startX + colonna * (boxW + gapX);
              const y = startY + riga * (boxH + gapY);

              // Disegna la "scatola" di sfondo per il dato
              ctx.fillStyle = '#1e293b';
              ctx.beginPath();
              ctx.roundRect(x, y, boxW, boxH, 20);
              ctx.fill();

              // Scrivi il nome della variabile (dal database) in grigio
              ctx.fillStyle = '#94a3b8';
              ctx.font = '24px sans-serif';
              ctx.fillText(nomeVariabile, x + 25, y + 50);

              // Scrivi il valore reale in bianco grande
              ctx.fillStyle = '#ffffff';
              ctx.font = 'bold 70px monospace';
              ctx.fillText(valore, x + 25, y + 140);
          }

          // Aggiorna l'ologramma 3D in AR
          const plane = document.getElementById(planeId);
          if(plane && plane.getObject3D('mesh')) {
              plane.getObject3D('mesh').material.map.needsUpdate = true;
          }
      }

      // ==========================================
      // 3. IL MOTORE DI RETE: INTERROGA GLI ENDPOINT URL
      // ==========================================
      async function scaricaDatiDaEndpoint() {
          
          // --- DEVICE 0: CENTRALE TERMICA ---
          // Esegue la chiamata solo se l'URL non è vuoto
          if (ENDPOINT_0 !== "") {
              try {
                  const rispostaMacchina = await fetch(ENDPOINT_0);
                  const datiMacchina = await rispostaMacchina.json();
                  
                  // L'endpoint 0 restituisce direttamente l'array dei dati.
                  // Lo passiamo alla nostra funzione dinamica.
                  disegnaGrigliaDinamica(ctxMacchina, datiMacchina, 'CENTRALE TERMICA - DEVICE 0', 'plane-macchina');
              } catch (errore) {
                  console.error("Errore di connessione a ENDPOINT_0:", errore);
              }
          }

          // --- DEVICE 1: MONITORAGGIO IAQ ---
          if (ENDPOINT_1 !== "") {
              try {
                  const rispostaIaq = await fetch(ENDPOINT_1);
                  const jsonIaq = await rispostaIaq.json();
                  
                  // L'endpoint 1 restituisce i dati dentro una scatola "message.signals"
                  const datiIaq = jsonIaq.message.signals;
                  
                  // Lo passiamo alla nostra funzione dinamica.
                  disegnaGrigliaDinamica(ctxIaq, datiIaq, 'MONITORAGGIO IAQ - DEVICE 1', 'plane-iaq');
              } catch (errore) {
                  console.error("Errore di connessione a ENDPOINT_1:", errore);
              }
          }
      }

      // Interroga gli URL ogni 3 secondi per aggiornare la grafica in tempo reale
      setInterval(scaricaDatiDaEndpoint, 3000);
      scaricaDatiDaEndpoint();

    </script>
  </body>
</html>
