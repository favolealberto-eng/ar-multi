<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR Multi-Device Dashboard (JSON Fetch)</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <canvas id="canvas-macchina" width="1600" height="900" style="display:none;"></canvas>
    <canvas id="canvas-iaq" width="1600" height="900" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true;">
      
      <a-marker type="barcode" value="0" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-macchina" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-macchina; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-marker type="barcode" value="1" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity rotation="-75 0 0">
          <a-plane id="plane-iaq" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-iaq; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>

      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
      const ctxMacchina = document.getElementById('canvas-macchina').getContext('2d');
      const ctxIaq = document.getElementById('canvas-iaq').getContext('2d');

      // ==========================================
      // FUNZIONI DI DISEGNO (I cruscotti grafici)
      // ==========================================

      // Cerca un valore specifico dentro il JSON delle macchine
      function getValoreMacchina(dati, nomeVariabile) {
          const item = dati.find(d => d.name === nomeVariabile);
          return item ? item.value.toFixed(1) : "N/D";
      }

      function disegnaPannelloMacchina(dati) {
          ctxMacchina.fillStyle = '#0f172a';
          ctxMacchina.fillRect(0, 0, 1600, 900);

          ctxMacchina.fillStyle = '#ffffff';
          ctxMacchina.font = 'bold 70px sans-serif';
          ctxMacchina.fillText('CENTRALE TERMICA - DEVICE 0', 80, 120);

          // Estraiamo i dati che ci servono usando i nomi esatti del JSON
          const tMandata = getValoreMacchina(dati, "Temperatura_Mandata_Primario");
          const tRitorno = getValoreMacchina(dati, "Temperatura_Ritorno_Primario");
          const setpoint = getValoreMacchina(dati, "SP_mandata_secondario");

          function boxValore(ctx, x, y, titolo, valore, unita, colore) {
              ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(x, y, 400, 300, 20); ctx.fill();
              ctx.fillStyle = '#94a3b8'; ctx.font = '35px sans-serif'; ctx.fillText(titolo, x+40, y+70);
              ctx.fillStyle = colore; ctx.font = 'bold 110px monospace'; ctx.fillText(valore, x+40, y+200);
              ctx.fillStyle = '#94a3b8'; ctx.font = '40px sans-serif'; ctx.fillText(unita, x+280, y+200);
          }

          boxValore(ctxMacchina, 80, 250, "T. Mandata", tMandata, "°C", "#ef4444");
          boxValore(ctxMacchina, 530, 250, "T. Ritorno", tRitorno, "°C", "#3b82f6");
          boxValore(ctxMacchina, 980, 250, "Setpoint (SP)", setpoint, "°C", "#10b981");

          const plane = document.getElementById('plane-macchina');
          if(plane && plane.getObject3D('mesh')) plane.getObject3D('mesh').material.map.needsUpdate = true;
      }

      function disegnaPannelloIAQ(datiJson) {
          // Entriamo nella "scatola" giusta del JSON dell'aria
          const signals = datiJson.message.signals;
          const getSignal = (nome) => {
              const s = signals.find(s => s.name === nome);
              return s ? s.value : 0;
          };

          const co2 = getSignal("co2");
          const temp = getSignal("temper");
          const hum = getSignal("humid");
          const pm10 = getSignal("piemmedieci");

          ctxIaq.fillStyle = '#0f172a';
          ctxIaq.fillRect(0, 0, 1600, 900);

          ctxIaq.fillStyle = '#ffffff';
          ctxIaq.font = 'bold 70px sans-serif';
          ctxIaq.fillText('MONITORAGGIO IAQ - DEVICE 1', 80, 120);

          ctxIaq.fillStyle = '#cbd5e1'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText('Anidride Carbonica (CO2)', 80, 250);
          const gradiente = ctxIaq.createLinearGradient(80, 0, 1080, 0);
          gradiente.addColorStop(0, '#10b981'); gradiente.addColorStop(0.5, '#facc15'); gradiente.addColorStop(1, '#ef4444');
          ctxIaq.fillStyle = gradiente; ctxIaq.beginPath(); ctxIaq.roundRect(80, 280, 1000, 60, 30); ctxIaq.fill();
          
          let perc = (co2 - 400) / (2000 - 400); if(perc>1) perc=1; if(perc<0) perc=0;
          const indX = 80 + (1000 * perc);
          ctxIaq.fillStyle = '#ffffff'; ctxIaq.beginPath(); ctxIaq.arc(indX, 310, 20, 0, Math.PI*2); ctxIaq.fill();
          
          ctxIaq.font = 'bold 90px monospace'; ctxIaq.fillText(Math.round(co2), 1150, 340);
          ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText('ppm', 1400, 340);

          function boxMeteo(x, y, titolo, valore, unita) {
              ctxIaq.fillStyle = '#1e293b'; ctxIaq.beginPath(); ctxIaq.roundRect(x, y, 420, 250, 20); ctxIaq.fill();
              ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '35px sans-serif'; ctxIaq.fillText(titolo, x+40, y+60);
              ctxIaq.fillStyle = '#ffffff'; ctxIaq.font = 'bold 90px monospace'; ctxIaq.fillText(valore, x+40, y+170);
              ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText(unita, x+280, y+170);
          }

          boxMeteo(80, 480, "Temperatura", temp.toFixed(1), "°C");
          boxMeteo(550, 480, "Umidità", hum.toFixed(1), "%");
          boxMeteo(1020, 480, "Polveri PM10", pm10.toFixed(1), "µg");

          const plane = document.getElementById('plane-iaq');
          if(plane && plane.getObject3D('mesh')) plane.getObject3D('mesh').material.map.needsUpdate = true;
      }

      // ==========================================
      // IL MOTORE DI RETE: LEGGE I DUE FILE JSON
      // ==========================================
      async function scaricaDatiDaEndpoint() {
          
          // Legge il file dati-endpoint.json per il Marker 0
          try {
              const rispostaMacchina = await fetch('./dati-endpoint.json');
              const datiMacchina = await rispostaMacchina.json();
              disegnaPannelloMacchina(datiMacchina);
          } catch (errore) {
              console.error("Non riesco a leggere dati-endpoint.json", errore);
          }

          // Legge il file messagio-iaq.json per il Marker 1
          try {
              const rispostaIaq = await fetch('./messagio-iaq.json');
              const datiIaq = await rispostaIaq.json();
              disegnaPannelloIAQ(datiIaq);
          } catch (errore) {
              console.error("Non riesco a leggere messagio-iaq.json", errore);
          }
      }

      // Avvia la lettura dei file ogni 3 secondi e aggiorna la grafica
      setInterval(scaricaDatiDaEndpoint, 3000);
      scaricaDatiDaEndpoint();

    </script>
  </body>
</html>
