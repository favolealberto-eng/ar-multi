<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR Ultimate Factory Dashboard</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
      /* PULSANTIERA AR MINIMALE */
      #ui-controls {
        position: fixed; bottom: 30px; right: 20px; z-index: 1000;
        display: none; flex-direction: column; gap: 15px;
      }
      .btn-minimal {
        background: rgba(15, 23, 42, 0.6); color: #ffffff;
        border: 2px solid rgba(255, 255, 255, 0.4);
        width: 55px; height: 55px; border-radius: 50%;
        font-size: 24px; display: flex; justify-content: center; align-items: center;
        cursor: pointer; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      .btn-pin { background: rgba(249, 115, 22, 0.8); }

      /* MODALE 2D (Sfondo Scuro) */
      #hud-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 999999;
        flex-direction: column; align-items: center; justify-content: center;
      }

      /* HEADER DELLA MODALE (Pulsanti Chiudi) */
      #modal-header {
        position: absolute; top: 20px; width: 90%; max-width: 1000px;
        display: flex; justify-content: flex-end; align-items: center;
      }
      .btn-close {
        background: #ef4444; color: white; border: none; width: 45px; height: 45px;
        border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer;
      }

      /* CLASSI PER IL CANVAS PRINCIPALE QUANDO FISSATO */
      .canvas-pinned {
        display: block !important; width: 90% !important; max-width: 1000px !important;
        height: auto !important; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        border: 3px solid #3b82f6;
      }
    </style>
  </head>
  
  <body style="margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif;">

    <div id="ui-controls">
      <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
      <div id="modal-header">
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>
      </div>
      <div id="main-view-container"></div>
    </div>

    <canvas id="canvas-macchina" width="1600" height="900" style="display:none;"></canvas>
    <canvas id="canvas-iaq" width="1600" height="900" style="display:none;"></canvas>
    
    <canvas id="canvas-chart" width="1600" height="900" style="display:none;"></canvas>
    
    <canvas id="canvas-alarm" width="1600" height="900" style="display:none;"></canvas>
    
    <canvas id="canvas-hot" width="1024" height="256" style="display:none;"></canvas>
    <canvas id="canvas-cold" width="1024" height="256" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; sourceWidth: 1280; sourceHeight: 720; displayWidth: 1280; displayHeight: 720; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true; logarithmicDepthBuffer: true; alpha: true;">
      
      <a-entity id="marker-container"></a-entity>
      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>

      <a-entity camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
      // ==========================================
      // LOGICA DELL'INTERFACCIA (PIN E NAVIGAZIONE) E GESTIONE MARKER
      // Questa sezione gestisce il passaggio tra la visualizzazione 3D nativa in AR
      // e la modalità "Zoom/Pin" 2D su schermo intero.
      // ==========================================
      
      // Variabile di stato: true quando l'utente ha "fissato" un canvas nello schermo.
      let isPinned = false;
      // Traccia l'ID del canvas HTML (es. 'canvas-macchina') attualmente attivo/visibile
      let activeCanvasId = null; 
      // Array dinamico che conterrà tutti gli elementi <a-marker> generati dal CSV
      let markers = []; 

      // Mappatura fissa che associa la stringa che arriva dal CSV all'ID del Canvas HTML in cui verrà disegnata la grafica.
      const markerCanvasMap = {
          'macchina': 'canvas-macchina',
          'iaq': 'canvas-iaq',
          'chart': 'canvas-chart',
          'alarm': 'canvas-alarm',
          'frecce': 'canvas-hot' 
      };

      // Insieme di "Template Literal" HTML che contengono la struttura 3D specifica
      // da iniettare all'interno del marker generato. Nota: Per le frecce, la geometria è molto più complessa (animazioni, coni).
      const markerTemplates = {
          'macchina': '<a-entity rotation="-75 0 0"><a-plane id="plane-macchina" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-macchina; shader: flat;"></a-plane></a-entity>',
          'iaq': '<a-entity rotation="-75 0 0"><a-plane id="plane-iaq" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-iaq; shader: flat;"></a-plane></a-entity>',
          'chart': '<a-entity rotation="-75 0 0"><a-plane id="plane-chart" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-chart; shader: flat;"></a-plane></a-entity>',
          'alarm': '<a-entity rotation="-75 0 0"><a-plane id="plane-alarm" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-alarm; shader: flat;"></a-plane></a-entity>',
          'frecce': `
            <a-entity rotation="-75 0 0">
              <a-entity position="0 2 0">
                <a-plane id="plane-hot" position="0 1.2 0" width="3.8" height="0.95" material="src: #canvas-hot; transparent: true; shader: flat;"></a-plane>
                <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
                <a-entity animation="property: position; from: -1.5 0 0; to: 1.5 0 0; loop: true; dur: 2000; easing: linear">
                  <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="-1.5 0 0"></a-cone>
                  <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="0 0 0"></a-cone>
                  <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="1.5 0 0"></a-cone>
                </a-entity>
              </a-entity>
              <a-entity position="0 -2 0">
                <a-plane id="plane-cold" position="0 -1.2 0" width="3.8" height="0.95" material="src: #canvas-cold; transparent: true; shader: flat;"></a-plane>
                <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
                <a-entity animation="property: position; from: 1.5 0 0; to: -1.5 0 0; loop: true; dur: 2500; easing: linear">
                  <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="1.5 0 0"></a-cone>
                  <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="0 0 0"></a-cone>
                  <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="-1.5 0 0"></a-cone>
                </a-entity>
              </a-entity>
            </a-entity>`
      };

      /**
       * Inizializza gli eventi emessi da AR.js ogni volta che un marker entra o esce dall'inquadratura.
       * @param {HTMLElement} marker - L'elemento DOM <a-marker>
       * @param {string} type - La stringa indicante la tipologia (es. 'macchina', 'iaq')
       */
      function setupMarkerListeners(marker, type) {
          // Quando la fotocamera "vede" il marker:
          marker.addEventListener('markerFound', () => { 
              if (!isPinned) {
                  // Mostriamo il pulsante con il PIN (📌) solo se non siamo già in modalità schermo intero.
                  document.getElementById('ui-controls').style.display = 'flex'; 
                  // Salviamo quale canvas appartiene a questo specifico marker
                  activeCanvasId = markerCanvasMap[type];
              }
          });
          
          // Quando la fotocamera "perde" il marker (es. ci spostiamo, o cala la luce):
          marker.addEventListener('markerLost', () => { 
              // Usiamo un piccolo timeout (grazie all'asincronia) per evitare "sfarfallii" se il marker viene perso solo per 1 decimo di secondo.
              setTimeout(() => {
                  let anyVisible = markers.some(m => m.object3D.visible);
                  if (!isPinned && !anyVisible) {
                      // Se l'utente non ha fissato la schermata E nessun marker è visibile nell'inquadratura: nascondiamo il set di pulsanti
                      document.getElementById('ui-controls').style.display = 'none'; 
                      activeCanvasId = null;
                  } else if (!isPinned && anyVisible) {
                      // Se continuiamo a vedere almeno un altro marker, ripristiniamo l'id associato a quel marker
                      let visMarker = markers.find(m => m.object3D.visible);
                      activeCanvasId = markerCanvasMap[visMarker.dataset.type];
                  }
              }, 100);
          });
      }

      /**
       * Chiamata premendo il tasto "Pin". 
       * Rimuove il canvas dal framework 3D di A-Frame e lo "inietta" nel modale 2D sovrapposto.
       */
      function pinToScreen() {
          if (!activeCanvasId) return;
          isPinned = true;
          // Nascondiamo il bottone del PIN (ormai siamo bloccati)
          document.getElementById('ui-controls').style.display = 'none';
          // Mostriamo l'interfaccia "Oscurante" del modale
          document.getElementById('hud-modal').style.display = 'flex';
          
          const canvas = document.getElementById(activeCanvasId);
          if (canvas) {
              // Spostiamo "fisicamente" il tag <canvas> dentro il modale
              document.getElementById('main-view-container').appendChild(canvas);
              // Aggiungiamo una classe CSS per forzare la larghezza corretta, il radius e i bordi
              canvas.classList.add('canvas-pinned');
          }
      }

      /**
       * Chiamata premendo la "X" del modale.
       * Ripristina il canvas al suo posto originario in modo che AR-JS lo possa renderizzare di nuovo in prospettiva 3D.
       */
      function unpinFromScreen() {
          isPinned = false;
          // Nascondi la modalità a schermo intero
          document.getElementById('hud-modal').style.display = 'none';
          
          if (activeCanvasId) {
              const canvas = document.getElementById(activeCanvasId);
              if (canvas) {
                  // Rimettiamo il canvas nascosto (display:none) all'interno del body originario
                  document.body.appendChild(canvas);
                  canvas.classList.remove('canvas-pinned');
              }
          }
          activeCanvasId = null;
          
          // Fallback: se mentre chiudiamo il modale abbiamo ANCORA un marker nell'inquadratura, riattiviamo subito l'UI.
          let anyVisible = markers.some(m => m.object3D.visible);
          if (anyVisible) {
              document.getElementById('ui-controls').style.display = 'flex';
              let visMarker = markers.find(m => m.object3D.visible);
              activeCanvasId = markerCanvasMap[visMarker.dataset.type];
          }
      }

      // ==========================================
      // LETTURA CSV E CREAZIONE DINAMICA MARKER (LA "FABBRICA")
      // Questa sezione elimina la necessità di codificare gli <a-marker> "hardcoded" nell'HTML. 
      // Qualsiasi nuovo marker passa interamente da "markers.csv".
      // ==========================================
      async function loadMarkersFromCSV() {
          // #marker-container è una scatola <a-entity> "vuota" inserita prima nell'HTML dove depositeremo i marker dinamici.
          const container = document.getElementById('marker-container');
          try {
              // Esegue una chimata HTTP per ottenere il text data grezzo dal server
              const res = await fetch('./markers.csv');
              if (!res.ok) throw new Error("File CSV non trovato");
              const text = await res.text();
              
              // Divide usando il "ritorno a capo" \n per contare le righe
              const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);
              lines.forEach(line => {
                  // Separa le colonne tramite punto e virgola 
                  const parts = line.split(';');
                  if (parts.length === 2) {
                      const val = parts[0].trim(); // Es. "0"
                      const type = parts[1].trim(); // Es. "macchina"
                      
                      // Verifica che esista un template di grafica prima di procedere
                      if (markerTemplates[type]) {
                          // Genera fisicamente l'elemento DOM al volo...
                          const markerEl = document.createElement('a-marker');
                          markerEl.setAttribute('type', 'barcode');
                          markerEl.setAttribute('value', val); // Assegnamo l'id del barcode letto
                          // Tutta questa sfilza di attributi 'smooth' riduce enormemente il "jitter" 
                          // (lo sfarfallio della sagoma tra i frame della telecamera)
                          markerEl.setAttribute('emitevents', 'true');
                          markerEl.setAttribute('smooth', 'true');
                          markerEl.setAttribute('smoothCount', '7');
                          markerEl.setAttribute('smoothTolerance', '0.02');
                          markerEl.setAttribute('smoothThreshold', '5');
                          markerEl.dataset.type = type; // Metadata HTML5 utile per ripescarlo dopo
                          
                          // Inietto all'interno gli a-plane definiti nei template su in cima 
                          markerEl.innerHTML = markerTemplates[type];
                          // Aggancio il marker creato e configurato al DOM
                          container.appendChild(markerEl);
                          
                          // Lo registro nell'array "vivo" e gli preparo gli ascoltatori EventListeners
                          markers.push(markerEl);
                          setupMarkerListeners(markerEl, type);
                      }
                  }
              });
              console.log(`${markers.length} marker creati dinamicamente da CSV.`);
          } catch(e) {
              console.error("Errore nel caricamento dei marker. Verificare configurazione (markers.csv mancante? CORS backend?):", e);
          }
      }
      
      // Innesco la fabbricazione subito al caricamento js
      loadMarkersFromCSV();

      // ==========================================
      // UTILITY: FORZATURA RENDERING AR_JS
      // Per il fatto che A-Frame disegna sul canvas nativo e lo trasla come TEXTURE in WebGL:
      // bisogna DIRE ESPLICITAMENTE al Materiale 3D di "ricaricare" il canvas.
      // Se non chiamiamo questo metodo, i dati a schermo si aggiornano ma rimangono "frizzati" lato AR.
      // ==========================================
      const forceUpdate = (id) => {
          const plane = document.getElementById(id);
          if(plane && plane.getObject3D('mesh')) plane.getObject3D('mesh').material.map.needsUpdate = true;
      };

      // ==========================================
      // SEZIONE 1: MARKER 0 e 1 (JSON FETCH)
      // ==========================================
      const ctxMacchina = document.getElementById('canvas-macchina').getContext('2d');
      const ctxIaq = document.getElementById('canvas-iaq').getContext('2d');

      function disegnaPannelloMacchina(dati) {
          const getVal = (nome) => { const item = dati.find(d => d.name === nome); return item ? item.value.toFixed(1) : "N/D"; };
          ctxMacchina.fillStyle = '#0f172a'; ctxMacchina.fillRect(0, 0, 1600, 900);
          ctxMacchina.fillStyle = '#ffffff'; ctxMacchina.font = 'bold 70px sans-serif'; ctxMacchina.fillText('CENTRALE TERMICA - JSON', 80, 120);

          function boxValore(ctx, x, y, tit, val, unita, col) {
              ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.roundRect(x, y, 400, 300, 20); ctx.fill();
              ctx.fillStyle = '#94a3b8'; ctx.font = '35px sans-serif'; ctx.fillText(tit, x+40, y+70);
              ctx.fillStyle = col; ctx.font = 'bold 110px monospace'; ctx.fillText(val, x+40, y+200);
              ctx.fillStyle = '#94a3b8'; ctx.font = '40px sans-serif'; ctx.fillText(unita, x+280, y+200);
          }
          boxValore(ctxMacchina, 80, 250, "T. Mandata", getVal("Temperatura_Mandata_Primario"), "°C", "#ef4444");
          boxValore(ctxMacchina, 530, 250, "T. Ritorno", getVal("Temperatura_Ritorno_Primario"), "°C", "#3b82f6");
          boxValore(ctxMacchina, 980, 250, "Setpoint", getVal("SP_mandata_secondario"), "°C", "#10b981");
          forceUpdate('plane-macchina');
      }

      function disegnaPannelloIAQ(datiJson) {
          const signals = datiJson.message.signals;
          const getSig = (nome) => { const s = signals.find(s => s.name === nome); return s ? s.value : 0; };
          const co2 = getSig("co2");
          
          ctxIaq.fillStyle = '#0f172a'; ctxIaq.fillRect(0, 0, 1600, 900);
          ctxIaq.fillStyle = '#ffffff'; ctxIaq.font = 'bold 70px sans-serif'; ctxIaq.fillText('QUALITÀ ARIA - JSON', 80, 120);

          ctxIaq.fillStyle = '#cbd5e1'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText('Anidride Carbonica (CO2)', 80, 250);
          const grad = ctxIaq.createLinearGradient(80, 0, 1080, 0);
          grad.addColorStop(0, '#10b981'); grad.addColorStop(0.5, '#facc15'); grad.addColorStop(1, '#ef4444');
          ctxIaq.fillStyle = grad; ctxIaq.beginPath(); ctxIaq.roundRect(80, 280, 1000, 60, 30); ctxIaq.fill();
          
          let perc = (co2 - 400) / (2000 - 400); if(perc>1) perc=1; if(perc<0) perc=0;
          ctxIaq.fillStyle = '#ffffff'; ctxIaq.beginPath(); ctxIaq.arc(80 + (1000 * perc), 310, 20, 0, Math.PI*2); ctxIaq.fill();
          
          ctxIaq.font = 'bold 90px monospace'; ctxIaq.fillText(Math.round(co2), 1150, 340);
          ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText('ppm', 1400, 340);

          function boxM(x, y, tit, val, unita) {
              ctxIaq.fillStyle = '#1e293b'; ctxIaq.beginPath(); ctxIaq.roundRect(x, y, 420, 250, 20); ctxIaq.fill();
              ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '35px sans-serif'; ctxIaq.fillText(tit, x+40, y+60);
              ctxIaq.fillStyle = '#ffffff'; ctxIaq.font = 'bold 90px monospace'; ctxIaq.fillText(val, x+40, y+170);
              ctxIaq.fillStyle = '#94a3b8'; ctxIaq.font = '40px sans-serif'; ctxIaq.fillText(unita, x+280, y+170);
          }
          boxM(80, 480, "Temperatura", getSig("temper").toFixed(1), "°C");
          boxM(550, 480, "Umidità", getSig("humid").toFixed(1), "%");
          boxM(1020, 480, "Polveri PM10", getSig("piemmedieci").toFixed(1), "µg");
          forceUpdate('plane-iaq');
      }

      async function scaricaJson() {
          try { const r = await fetch('./dati-endpoint.json'); disegnaPannelloMacchina(await r.json()); } catch (e) { console.warn("Manca dati-endpoint.json"); }
          try { const r = await fetch('./messagio-iaq.json'); disegnaPannelloIAQ(await r.json()); } catch (e) { console.warn("Manca messagio-iaq.json"); }
      }
      setInterval(scaricaJson, 3000);
      scaricaJson();

      // ==========================================
      // SEZIONE 2: MARKER 2 (CHART DINAMICO)
      // ==========================================
      const ctxChart = document.getElementById('canvas-chart').getContext('2d');
      Chart.defaults.color = '#cbd5e1'; Chart.defaults.font.family = 'sans-serif';
      
      const chartInstance = new Chart(ctxChart, {
          type: 'line',
          data: {
              labels: ['-10s', '-8s', '-6s', '-4s', '-2s', 'Ora'],
              datasets: [{
                  label: 'Potenza kW', data: [15.2, 15.5, 16.1, 15.8, 16.5, 16.2],
                  borderColor: '#0ea5e9', backgroundColor: 'rgba(14, 165, 233, 0.2)', borderWidth: 6,
                  tension: 0.4, fill: true, pointRadius: 8, pointBackgroundColor: '#ffffff'
              }]
          },
          options: {
              responsive: false, animation: { duration: 500 },
              layout: { padding: 40 },
              plugins: {
                  customCanvasBackgroundColor: true,
                  legend: { labels: { font: { size: 24 } } },
                  title: { display: true, text: 'POTENZA MACCHINA', color: '#ffffff', font: { size: 64, weight: 'bold' } },
                  subtitle: { display: true, text: 'Live Data Simulato', color: '#94a3b8', font: { size: 32 }, padding: { bottom: 40 } }
              },
              scales: { y: { min: 10, max: 25, ticks: { font: { size: 24 } } }, x: { ticks: { font: { size: 24 } } } }
          },
          plugins: [{
              id: 'customCanvasBackgroundColor',
              beforeDraw: (ch) => {
                  const c = ch.canvas.getContext('2d'); c.save(); c.globalCompositeOperation = 'destination-over';
                  c.fillStyle = '#0f172a'; c.fillRect(0, 0, ch.width, ch.height); c.restore();
              }
          }]
      });

      setInterval(() => {
          chartInstance.data.datasets[0].data.shift();
          chartInstance.data.datasets[0].data.push((Math.random() * 4 + 14).toFixed(1));
          const oggi = new Date();
          chartInstance.options.plugins.subtitle.text = `Aggiornato: ${oggi.toLocaleTimeString()}`;
          chartInstance.update();
          forceUpdate('plane-chart');
      }, 2000);

      // ==========================================
      // SEZIONE 3: MARKER 3 (SPIA ALLARME)
      // ==========================================
      const ctxAlarm = document.getElementById('canvas-alarm').getContext('2d');
      let tAlarm = 65.0, upAlarm = true;

      setInterval(() => {
          if (upAlarm) { tAlarm += Math.random() * 3; if (tAlarm > 95) upAlarm = false; } 
          else { tAlarm -= Math.random() * 2; if (tAlarm < 65) upAlarm = true; }
      }, 1000);

      function loopAlarm() {
          ctxAlarm.fillStyle = '#0f172a'; ctxAlarm.fillRect(0, 0, 1600, 900);
          
          let st, cB, cD, tSt, tDet;
          if (tAlarm <= 75) { st=0; cB='#10b981'; cD='#10b981'; tSt="SISTEMA OK"; tDet=`Valore: ${tAlarm.toFixed(1)} °C`; }
          else if (tAlarm <= 85) { st=1; cB='#facc15'; cD='#713f12'; tSt="ANOMALIA"; tDet=`Attuale: ${tAlarm.toFixed(1)} °C | Max: 75.0 °C`; }
          else { st=2; cB='#ef4444'; cD='#7f1d1d'; tSt="CRITICO"; tDet=`Attuale: ${tAlarm.toFixed(1)} °C | OVERHEAT`; }

          const blink = (Date.now() % 1000) < 500;
          const colSpia = (st > 0 && !blink) ? cD : cB;

          ctxAlarm.beginPath(); ctxAlarm.arc(250, 450, 120, 0, 2 * Math.PI);
          ctxAlarm.shadowBlur = (st > 0 && !blink) ? 0 : 40; ctxAlarm.shadowColor = cB;
          ctxAlarm.fillStyle = colSpia; ctxAlarm.fill(); ctxAlarm.shadowBlur = 0;
          ctxAlarm.lineWidth = 15; ctxAlarm.strokeStyle = cB; ctxAlarm.stroke();

          ctxAlarm.fillStyle = '#ffffff'; ctxAlarm.font = 'bold 70px sans-serif'; ctxAlarm.fillText('DIAGNOSTICA', 100, 150);
          ctxAlarm.fillStyle = cB; ctxAlarm.font = 'bold 110px sans-serif'; ctxAlarm.fillText(tSt, 450, 460);
          ctxAlarm.fillStyle = '#cbd5e1'; ctxAlarm.font = '55px monospace'; ctxAlarm.fillText(tDet, 450, 560);

          forceUpdate('plane-alarm');
          requestAnimationFrame(loopAlarm);
      }
      requestAnimationFrame(loopAlarm);

      // ==========================================
      // SEZIONE 4: MARKER 4 (FRECCE 3D)
      // ==========================================
      const ctxHot = document.getElementById('canvas-hot').getContext('2d');
      const ctxCold = document.getElementById('canvas-cold').getContext('2d');
      const arrHot = document.querySelectorAll('.arrow-hot');
      const arrCold = document.querySelectorAll('.arrow-cold');
      
      let tHot = 95.0, tCold = 7.0;

      function colora(c1, c2, f) {
          return `rgb(${Math.round(c1[0]+f*(c2[0]-c1[0]))}, ${Math.round(c1[1]+f*(c2[1]-c1[1]))}, ${Math.round(c1[2]+f*(c2[2]-c1[2]))})`;
      }

      setInterval(() => {
          tHot += (Math.random() * 2 - 1); tCold += (Math.random() * 0.6 - 0.3);

          // Disegna Etichetta Calda
          ctxHot.clearRect(0, 0, 1024, 256); ctxHot.fillStyle = '#0f172a'; ctxHot.beginPath(); ctxHot.roundRect(10, 10, 1004, 236, 40); ctxHot.fill();
          ctxHot.textAlign = 'center'; ctxHot.fillStyle = '#ffb74d'; ctxHot.font = 'bold 50px sans-serif'; ctxHot.fillText('MANDATA VAPORE', 512, 90);
          ctxHot.fillStyle = '#ffffff'; ctxHot.font = 'bold 110px monospace'; ctxHot.fillText(`${tHot.toFixed(1)} °C`, 512, 210);
          
          // Disegna Etichetta Fredda
          ctxCold.clearRect(0, 0, 1024, 256); ctxCold.fillStyle = '#0f172a'; ctxCold.beginPath(); ctxCold.roundRect(10, 10, 1004, 236, 40); ctxCold.fill();
          ctxCold.textAlign = 'center'; ctxCold.fillStyle = '#4fc3f7'; ctxCold.font = 'bold 50px sans-serif'; ctxCold.fillText('RITORNO ACQUA', 512, 90);
          ctxCold.fillStyle = '#ffffff'; ctxCold.font = 'bold 110px monospace'; ctxCold.fillText(`${tCold.toFixed(1)} °C`, 512, 210);

          forceUpdate('plane-hot'); forceUpdate('plane-cold');

          // Aggiorna colori coni 3D
          let fH = Math.max(0, Math.min(1, (tHot - 85) / 20));
          let cH = colora([255, 165, 0], [255, 0, 0], fH);
          arrHot.forEach(a => a.setAttribute('color', cH));

          let fC = Math.max(0, Math.min(1, (tCold - 2) / 10));
          let cC = colora([0, 0, 255], [0, 255, 255], fC);
          arrCold.forEach(a => a.setAttribute('color', cC));

      }, 500);

    </script>
  </body>
