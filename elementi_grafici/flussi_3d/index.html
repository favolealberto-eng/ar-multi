<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - Flow 3D & Canvas UI</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <canvas id="canvas-hot" width="1024" height="256" style="display:none;"></canvas>
    <canvas id="canvas-cold" width="1024" height="256" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true;">
      
      <a-marker type="barcode" value="2" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        
        <a-entity rotation="-90 0 0">
          
          <a-entity position="0 2 0">
            
            <a-plane id="plane-hot" position="0 1.2 0" width="3.8" height="0.95" material="src: #canvas-hot; transparent: true; shader: flat;"></a-plane>
            
            <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
            
            <a-entity animation="property: position; from: -1.5 0 0; to: 1.5 0 0; loop: true; dur: 2000; easing: linear">
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="-1.5 0 0"></a-cone>
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="0 0 0"></a-cone>
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="1.5 0 0"></a-cone>
            </a-entity>
          </a-entity>

          <a-entity position="0 -2 0">
            
            <a-plane id="plane-cold" position="0 -1.2 0" width="3.8" height="0.95" material="src: #canvas-cold; transparent: true; shader: flat;"></a-plane>
            
            <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
            
            <a-entity animation="property: position; from: 1.5 0 0; to: -1.5 0 0; loop: true; dur: 2500; easing: linear">
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="1.5 0 0"></a-cone>
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="0 0 0"></a-cone>
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="-1.5 0 0"></a-cone>
            </a-entity>
          </a-entity>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      // MATEMATICA COLORI
      function intersecaColore(rgbStart, rgbEnd, fattore) {
          const r = Math.round(rgbStart[0] + fattore * (rgbEnd[0] - rgbStart[0]));
          const g = Math.round(rgbStart[1] + fattore * (rgbEnd[1] - rgbStart[1]));
          const b = Math.round(rgbStart[2] + fattore * (rgbEnd[2] - rgbStart[2]));
          return `rgb(${r}, ${g}, ${b})`;
      }

      // VARIABILI 3D
      const frecceCalde = document.querySelectorAll('.arrow-hot');
      const frecceFredde = document.querySelectorAll('.arrow-cold');

      // VARIABILI CANVAS 2D
      const ctxHot = document.getElementById('canvas-hot').getContext('2d');
      const ctxCold = document.getElementById('canvas-cold').getContext('2d');

      let tempCalda = 95.0;
      let tempFredda = 7.0;

      // FUNZIONE DI DISEGNO DELLE TARGHETTE HD
      function aggiornaTarghette() {
          // --- DISEGNO TARGHETTA CALDA ---
          // Sfondo scuro trasparente per evitare il bianco brutto fuori dal bordo
          ctxHot.clearRect(0, 0, 1024, 256); 
          ctxHot.fillStyle = '#0f172a';
          ctxHot.beginPath();
          ctxHot.roundRect(10, 10, 1004, 236, 40); // Crea il bordo arrotondato
          ctxHot.fill();

          ctxHot.textAlign = 'center';
          ctxHot.fillStyle = '#ffb74d';
          ctxHot.font = 'bold 50px sans-serif';
          ctxHot.fillText('VAPORE SURRISCALDATO | MANDATA', 512, 90);
          
          ctxHot.fillStyle = '#ffffff';
          ctxHot.font = 'bold 110px monospace';
          ctxHot.fillText(`${tempCalda.toFixed(1)} °C`, 512, 210);

          // --- DISEGNO TARGHETTA FREDDA ---
          ctxCold.clearRect(0, 0, 1024, 256);
          ctxCold.fillStyle = '#0f172a';
          ctxCold.beginPath();
          ctxCold.roundRect(10, 10, 1004, 236, 40);
          ctxCold.fill();

          ctxCold.textAlign = 'center';
          ctxCold.fillStyle = '#4fc3f7';
          ctxCold.font = 'bold 50px sans-serif';
          ctxCold.fillText('ACQUA REFRIGERATA | RITORNO', 512, 90);
          
          ctxCold.fillStyle = '#ffffff';
          ctxCold.font = 'bold 110px monospace';
          ctxCold.fillText(`${tempFredda.toFixed(1)} °C`, 512, 210);

          // --- COMUNICAZIONE ALLA SCHEDA VIDEO (Aggiorna le Texture 3D) ---
          const pHot = document.getElementById('plane-hot');
          const pCold = document.getElementById('plane-cold');
          if(pHot && pHot.getObject3D('mesh')) pHot.getObject3D('mesh').material.map.needsUpdate = true;
          if(pCold && pCold.getObject3D('mesh')) pCold.getObject3D('mesh').material.map.needsUpdate = true;
      }

      // LOOP PRINCIPALE
      setInterval(() => {
          // 1. Simula l'oscillazione termodinamica
          tempCalda += (Math.random() * 2 - 1); 
          tempFredda += (Math.random() * 0.6 - 0.3); 

          // 2. Ridisegna le etichette Canvas
          aggiornaTarghette();

          // 3. Calcola l'interpolazione vettoriale (Color Map 3D)
          let fattoreCaldo = (tempCalda - 85) / (105 - 85);
          if (fattoreCaldo > 1) fattoreCaldo = 1; if (fattoreCaldo < 0) fattoreCaldo = 0;
          const coloreCaldo = intersecaColore([255, 165, 0], [255, 0, 0], fattoreCaldo);
          frecceCalde.forEach(freccia => freccia.setAttribute('color', coloreCaldo));

          let fattoreFreddo = (tempFredda - 2) / (12 - 2);
          if (fattoreFreddo > 1) fattoreFreddo = 1; if (fattoreFreddo < 0) fattoreFreddo = 0;
          const coloreFreddo = intersecaColore([0, 0, 255], [0, 255, 255], fattoreFreddo);
          frecceFredde.forEach(freccia => freccia.setAttribute('color', coloreFreddo));

      }, 500); // Si aggiorna ogni mezzo secondo

      // Disegna le targhette subito all'avvio
      aggiornaTarghette();
    </script>
  </body>
</html>
