<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - Flow Fluidodinamico 3D con Targhette</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden;">

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;"
             renderer="antialias: true;">
      
      <a-marker type="barcode" value="2" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        
        <a-entity rotation="-90 0 0">
          
          <a-entity position="0 2 0">
            
            <a-plane position="0 1.2 0" width="3.8" height="1" material="color: #0f172a; opacity: 0.85; shader: flat;">
                <a-text value="Vapore Surriscaldato | Mandata" position="0 0.25 0.02" align="center" color="#ffb74d" width="4"></a-text>
                <a-text id="temp-hot-text" value="95.0 °C" position="0 -0.2 0.02" align="center" color="#ffffff" width="4.5"></a-text>
            </a-plane>
            
            <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
            
            <a-entity animation="property: position; from: -1.5 0 0; to: 1.5 0 0; loop: true; dur: 2000; easing: linear">
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="-1.5 0 0"></a-cone>
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="0 0 0"></a-cone>
              <a-cone class="arrow-hot" radius-bottom="0.2" height="0.5" rotation="0 0 -90" position="1.5 0 0"></a-cone>
            </a-entity>
          </a-entity>

          <a-entity position="0 -2 0">
            
            <a-plane position="0 -1.2 0" width="3.8" height="1" material="color: #0f172a; opacity: 0.85; shader: flat;">
                <a-text value="Acqua Refrigerata | Ritorno" position="0 0.25 0.02" align="center" color="#4fc3f7" width="4"></a-text>
                <a-text id="temp-cold-text" value="7.0 °C" position="0 -0.2 0.02" align="center" color="#ffffff" width="4.5"></a-text>
            </a-plane>
            
            <a-cylinder radius="0.3" height="4.5" rotation="0 0 90" color="#111" opacity="0.4" transparent="true"></a-cylinder>
            
            <a-entity animation="property: position; from: 1.5 0 0; to: -1.5 0 0; loop: true; dur: 2500; easing: linear">
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="1.5 0 0"></a-cone>
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="0 0 0"></a-cone>
              <a-cone class="arrow-cold" radius-bottom="0.2" height="0.5" rotation="0 0 90" position="-1.5 0 0"></a-cone>
            </a-entity>
          </a-entity>

        </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <script>
      function intersecaColore(rgbStart, rgbEnd, fattore) {
          const r = Math.round(rgbStart[0] + fattore * (rgbEnd[0] - rgbStart[0]));
          const g = Math.round(rgbStart[1] + fattore * (rgbEnd[1] - rgbStart[1]));
          const b = Math.round(rgbStart[2] + fattore * (rgbEnd[2] - rgbStart[2]));
          return `rgb(${r}, ${g}, ${b})`;
      }

      const frecceCalde = document.querySelectorAll('.arrow-hot');
      const frecceFredde = document.querySelectorAll('.arrow-cold');
      const testoCaldo = document.getElementById('temp-hot-text');
      const testoFreddo = document.getElementById('temp-cold-text');

      let tempCalda = 95.0;
      let tempFredda = 7.0;

      setInterval(() => {
          tempCalda += (Math.random() * 2 - 1); 
          tempFredda += (Math.random() * 0.6 - 0.3); 

          testoCaldo.setAttribute('value', `${tempCalda.toFixed(1)} °C`);
          testoFreddo.setAttribute('value', `${tempFredda.toFixed(1)} °C`);

          let fattoreCaldo = (tempCalda - 85) / (105 - 85);
          if (fattoreCaldo > 1) fattoreCaldo = 1; if (fattoreCaldo < 0) fattoreCaldo = 0;
          const coloreCaldo = intersecaColore([255, 165, 0], [255, 0, 0], fattoreCaldo);
          frecceCalde.forEach(freccia => freccia.setAttribute('color', coloreCaldo));

          let fattoreFreddo = (tempFredda - 2) / (12 - 2);
          if (fattoreFreddo > 1) fattoreFreddo = 1; if (fattoreFreddo < 0) fattoreFreddo = 0;
          const coloreFreddo = intersecaColore([0, 0, 255], [0, 255, 255], fattoreFreddo);
          frecceFredde.forEach(freccia => freccia.setAttribute('color', coloreFreddo));

      }, 500);
    </script>
  </body>
</html>
