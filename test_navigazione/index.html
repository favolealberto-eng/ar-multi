<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>EURIX - AR IAQ Interactive Dashboard</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }

      /* PULSANTIERA AR MINIMALE */
      #ui-controls {
        position: fixed; bottom: 30px; right: 20px; z-index: 1000;
        display: none; flex-direction: column; gap: 15px;
      }
      .btn-minimal {
        background: rgba(15, 23, 42, 0.6); color: #ffffff;
        border: 2px solid rgba(255, 255, 255, 0.4);
        width: 55px; height: 55px; border-radius: 50%;
        font-size: 24px; display: flex; justify-content: center; align-items: center;
        cursor: pointer; backdrop-filter: blur(5px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      }
      .btn-pin { background: rgba(249, 115, 22, 0.8); }

      /* MODALE 2D (Sfondo Scuro) */
      #hud-modal {
        display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 999999;
        flex-direction: column; align-items: center; justify-content: center;
      }

      /* HEADER DELLA MODALE (Pulsanti Indietro e Chiudi) */
      #modal-header {
        position: absolute; top: 20px; width: 90%; max-width: 1000px;
        display: flex; justify-content: space-between; align-items: center;
      }
      .btn-nav {
        background: #3b82f6; color: white; border: none; padding: 10px 20px;
        border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer;
        display: none; /* Il tasto indietro è nascosto all'inizio */
      }
      .btn-close {
        background: #ef4444; color: white; border: none; width: 45px; height: 45px;
        border-radius: 50%; font-size: 20px; font-weight: bold; cursor: pointer;
      }

      /* CLASSI PER IL CANVAS PRINCIPALE QUANDO FISSATO */
      .canvas-pinned {
        display: block !important; width: 90% !important; max-width: 1000px !important;
        height: auto !important; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        border: 3px solid #3b82f6; cursor: pointer; /* Indica che si può cliccare */
      }

      /* PANNELLO DI DETTAGLIO (Nascosto di default) */
      #detail-view {
        display: none; width: 90%; max-width: 1000px; height: 60vh; min-height: 400px;
        background: #1e293b; border-radius: 15px; padding: 20px;
        box-sizing: border-box; border: 3px solid #3b82f6; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        flex-direction: row; gap: 20px;
      }
      
      /* LAYOUT DEL DETTAGLIO: Grafico a sx, Dati a dx */
      #detail-chart-container { flex: 2; background: #0f172a; border-radius: 10px; padding: 15px; position: relative;}
      #detail-data-container { flex: 1; display: flex; flex-direction: column; gap: 15px; }
      
      .data-card {
        background: #0f172a; border-radius: 10px; padding: 20px; flex: 1;
        display: flex; flex-direction: column; justify-content: center;
      }
      .data-title { color: #94a3b8; font-size: 18px; margin-bottom: 10px; }
      .data-value { color: #ffffff; font-size: 40px; font-weight: bold; font-family: monospace; }
      .data-unit { color: #94a3b8; font-size: 20px; margin-left: 5px; }
      .val-current { color: #10b981; } /* Verde per l'attuale */
      .val-predict { color: #facc15; } /* Giallo per la predizione */

      @media (max-width: 768px) {
        #detail-view { flex-direction: column; height: 80vh; }
        .data-card { padding: 10px; }
      }
    </style>
  </head>
  
  <body>

    <div id="ui-controls">
      <button class="btn-minimal btn-pin" onclick="pinToScreen()">📌</button>
    </div>

    <div id="hud-modal">
      <div id="modal-header">
        <button id="btn-back" class="btn-nav" onclick="goBackToMain()">⬅️ Torna al Cruscotto</button>
        <button class="btn-close" onclick="unpinFromScreen()">✖</button>
      </div>
      
      <div id="main-view-container"></div>
      
      <div id="detail-view">
        <div id="detail-chart-container">
          <canvas id="chart-canvas"></canvas>
        </div>
        <div id="detail-data-container">
          <h2 id="detail-title" style="color: white; margin: 0; text-align: center; border-bottom: 2px solid #334155; padding-bottom: 10px;">Variabile</h2>
          <div class="data-card">
            <div class="data-title">Valore Attuale (Live)</div>
            <div><span id="txt-current" class="data-value val-current">--</span><span class="data-unit unit-label"></span></div>
          </div>
          <div class="data-card">
            <div class="data-title">Predizione Estesa (+1h)</div>
            <div><span id="txt-predict" class="data-value val-predict">--</span><span class="data-unit unit-label"></span></div>
          </div>
        </div>
      </div>
    </div>

    <canvas id="canvas-iaq" width="1600" height="900" style="display:none;"></canvas>

    <a-scene embedded 
             arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false; videoParameters: { audio: false };"
             renderer="antialias: true;">
      
      <a-marker id="marker-1" type="barcode" value="1" emitevents="true" smooth="true" smoothCount="10" smoothTolerance="0.05" smoothThreshold="2">
        <a-entity id="content-1" rotation="-75 0 0">
          <a-plane id="plane-iaq" position="0 1.5 0" width="4.8" height="2.7" material="src: #canvas-iaq; shader: flat;"></a-plane>
        </a-entity>
      </a-marker>
      <a-entity id="main-camera" camera look-controls="enabled: false" wasd-controls="enabled: false"></a-entity>
    </a-scene>

    <script>
      // ==========================================
      // DATABASE SIMULATO IN TEMPO REALE
      // ==========================================
      const dataStore = {
          CO2: { val: 680, unit: 'ppm' },
          Temperatura: { history: [24.5, 24.8, 25.0, 25.1, 25.1], pred: 25.6, unit: '°C' },
          Umidità: { history: [32.0, 32.5, 33.0, 33.2, 33.4], pred: 35.0, unit: '%' },
          PM10: { history: [1.1, 1.2, 1.3, 1.4, 1.4], pred: 1.8, unit: 'µg' }
      };

      // Aggiornamento dati ogni secondo (Passeggiata casuale)
      setInterval(() => {
          dataStore.CO2.val += (Math.random() * 4 - 2);
          
          ['Temperatura', 'Umidità', 'PM10'].forEach(key => {
              let varData = dataStore[key];
              let lastVal = varData.history[varData.history.length - 1];
              let diff = (Math.random() * 0.4 - 0.2); // Variazione live
              let newVal = lastVal + diff;
              
              // Sposta lo storico (tiene gli ultimi 5 minuti simulati)
              varData.history.shift();
              varData.history.push(newVal);
              
              // Ricalcola una finta predizione a +1h (aggiunge un trend)
              varData.pred = newVal + (diff * 10) + (Math.random() * 0.5);
          });
          
          updateGraphics();
      }, 1000);

      // ==========================================
      // LOGICA DELL'INTERFACCIA (PIN E NAVIGAZIONE)
      // ==========================================
      let isPinned = false;
      let activeDetail = null; // Memorizza quale variabile stiamo guardando ('Temperatura', etc.)

      const marker = document.getElementById('marker-1');
      marker.addEventListener('markerFound', () => { if (!isPinned) document.getElementById('ui-controls').style.display = 'flex'; });
      marker.addEventListener('markerLost', () => { if (!isPinned) document.getElementById('ui-controls').style.display = 'none'; });

      function pinToScreen() {
          isPinned = true;
          document.getElementById('ui-controls').style.display = 'none';
          document.getElementById('hud-modal').style.display = 'flex';
          
          // Sposta il canvas nel modale
          const canvas = document.getElementById('canvas-iaq');
          document.getElementById('main-view-container').appendChild(canvas);
          canvas.classList.add('canvas-pinned');
      }

      function unpinFromScreen() {
          isPinned = false;
          activeDetail = null;
          
          // Nascondi modale e ripristina viste
          document.getElementById('hud-modal').style.display = 'none';
          document.getElementById('detail-view').style.display = 'none';
          document.getElementById('main-view-container').style.display = 'block';
          document.getElementById('btn-back').style.display = 'none';
          
          // Rimetti il canvas nel body
          const canvas = document.getElementById('canvas-iaq');
          document.body.appendChild(canvas);
          canvas.classList.remove('canvas-pinned');
          
          if (marker.object3D.visible) document.getElementById('ui-controls').style.display = 'flex';
      }

      // NAVIGAZIONE: Apre il dettaglio
      function openDetail(variableName) {
          activeDetail = variableName;
          
          // UI Switch
          document.getElementById('main-view-container').style.display = 'none';
          document.getElementById('detail-view').style.display = 'flex';
          document.getElementById('btn-back').style.display = 'block';
          
          // Setup Testi
          document.getElementById('detail-title').innerText = `ANALISI: ${variableName.toUpperCase()}`;
          document.querySelectorAll('.unit-label').forEach(el => el.innerText = dataStore[variableName].unit);
          
          updateGraphics(); // Forza aggiornamento immediato del grafico
      }

      // NAVIGAZIONE: Torna indietro
      function goBackToMain() {
          activeDetail = null;
          document.getElementById('detail-view').style.display = 'none';
          document.getElementById('btn-back').style.display = 'none';
          document.getElementById('main-view-container').style.display = 'block';
      }

      // GESTIONE DEI CLICK SUL CANVAS PRINCIPALE
      const canvasIaq = document.getElementById('canvas-iaq');
      canvasIaq.addEventListener('click', (event) => {
          if (!isPinned || activeDetail !== null) return; // Funziona solo se fissato e nel main

          // Calcola le coordinate del click riscalate alla risoluzione 1600x900
          const rect = canvasIaq.getBoundingClientRect();
          const scaleX = canvasIaq.width / rect.width;
          const scaleY = canvasIaq.height / rect.height;
          const clickX = (event.clientX - rect.left) * scaleX;
          const clickY = (event.clientY - rect.top) * scaleY;

          // Mappatura delle aree interattive (i 3 riquadri in basso)
          // I riquadri sono disegnati a Y=480, altezza=250 (fino a 730)
          if (clickY >= 480 && clickY <= 730) {
              if (clickX >= 80 && clickX <= 500) openDetail('Temperatura');
              else if (clickX >= 550 && clickX <= 970) openDetail('Umidità');
              else if (clickX >= 1020 && clickX <= 1440) openDetail('PM10');
          }
      });


      // ==========================================
      // GRAFICA 2D (CANVAS PRINCIPALE)
      // ==========================================
      const ctx = canvasIaq.getContext('2d');
      function drawMainCanvas() {
          const co2 = dataStore.CO2.val;
          const temp = dataStore.Temperatura.history[4];
          const hum = dataStore.Umidità.history[4];
          const pm10 = dataStore.PM10.history[4];

          ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, 1600, 900);
          ctx.fillStyle = '#ffffff'; ctx.font = 'bold 70px sans-serif'; ctx.fillText('MONITORAGGIO IAQ - DEVICE 1', 80, 120);

          // BARRA CO2 (Non cliccabile)
          ctx.fillStyle = '#cbd5e1'; ctx.font = '40px sans-serif'; ctx.fillText('Anidride Carbonica (CO2)', 80, 250);
          const grad = ctx.createLinearGradient(80, 0, 1080, 0);
          grad.addColorStop(0, '#10b981'); grad.addColorStop(0.5, '#facc15'); grad.addColorStop(1, '#ef4444');
          ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(80, 280, 1000, 60, 30); ctx.fill();
          
          let perc = (co2 - 400) / (2000 - 400); if(perc>1) perc=1; if(perc<0) perc=0;
          ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(80 + (1000 * perc), 310, 20, 0, Math.PI*2); ctx.fill();
          
          ctx.font = 'bold 90px monospace'; ctx.fillText(Math.round(co2), 1150, 340);
          ctx.fillStyle = '#94a3b8'; ctx.font = '40px sans-serif'; ctx.fillText('ppm', 1400, 340);

          // RIQUADRI INTERATTIVI
          function drawInteractiveBox(x, y, title, value, unit) {
              // Effetto "bottone" per far capire che sono cliccabili
              ctx.fillStyle = '#1e293b'; 
              ctx.beginPath(); ctx.roundRect(x, y, 420, 250, 20); ctx.fill();
              
              // Bordo azzurro tenue
              ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 3; ctx.stroke();

              // Icona lente per suggerire il click
              ctx.fillStyle = '#3b82f6'; ctx.font = '25px sans-serif'; ctx.fillText('🔍 Dettagli', x+260, y+40);

              ctx.fillStyle = '#94a3b8'; ctx.font = '35px sans-serif'; ctx.fillText(title, x+40, y+60);
              ctx.fillStyle = '#ffffff'; ctx.font = 'bold 90px monospace'; ctx.fillText(value, x+40, y+170);
              ctx.fillStyle = '#94a3b8'; ctx.font = '40px sans-serif'; ctx.fillText(unit, x+280, y+170);
          }

          drawInteractiveBox(80, 480, "Temperatura", temp.toFixed(1), "°C");
          drawInteractiveBox(550, 480, "Umidità", hum.toFixed(1), "%");
          drawInteractiveBox(1020, 480, "PM10", pm10.toFixed(1), "µg");

          // Aggiorna texture AR
          const plane = document.getElementById('plane-iaq');
          if(plane && plane.getObject3D('mesh')) plane.getObject3D('mesh').material.map.needsUpdate = true;
      }

      // ==========================================
      // GRAFICA CHART.JS (PANNELLO DETTAGLIO)
      // ==========================================
      Chart.defaults.color = '#cbd5e1';
      const ctxChart = document.getElementById('chart-canvas').getContext('2d');
      let detailChart = new Chart(ctxChart, {
          type: 'line',
          data: {
              labels: ['-4m', '-3m', '-2m', '-1m', 'Adesso', '+1h (Pred)'],
              datasets: [{
                  label: 'Storico e Predizione',
                  data: [0,0,0,0,0,0],
                  borderColor: '#3b82f6',
                  backgroundColor: 'rgba(59, 130, 246, 0.2)',
                  borderWidth: 4, tension: 0.3, fill: true,
                  pointRadius: 6, pointBackgroundColor: '#ffffff',
                  // Il trucco magico: fa diventare tratteggiata la linea dopo il punto "Adesso" (indice 4)
                  segment: { borderDash: ctx => ctx.p0DataIndex >= 4 ? [10, 10] : undefined }
              }]
          },
          options: {
              responsive: true, maintainAspectRatio: false, animation: { duration: 0 },
              plugins: { legend: { display: false } },
              scales: { y: { suggestedMin: 0, suggestedMax: 50 } }
          }
      });

      // ==========================================
      // GESTORE AGGIORNAMENTI GLOBALE
      // ==========================================
      function updateGraphics() {
          // 1. Aggiorna sempre il Canvas Principale (serve all'AR)
          drawMainCanvas();

          // 2. Se siamo nel dettaglio, aggiorna il grafico e i testi
          if (activeDetail !== null && isPinned) {
              const data = dataStore[activeDetail];
              
              // Aggiorna i testi grandi a destra
              document.getElementById('txt-current').innerText = data.history[4].toFixed(1);
              document.getElementById('txt-predict').innerText = data.pred.toFixed(1);

              // Crea l'array per il grafico: unisce i 5 dati passati con la predizione futura
              const chartData = [...data.history, data.pred];
              
              // Cambia colore al volo in base alla variabile per estetica
              let color = '#3b82f6'; // Blu default
              if(activeDetail === 'Temperatura') color = '#ef4444'; // Rosso
              else if(activeDetail === 'PM10') color = '#f59e0b'; // Arancio
              
              detailChart.data.datasets[0].data = chartData;
              detailChart.data.datasets[0].borderColor = color;
              detailChart.data.datasets[0].backgroundColor = color + '33'; // 33 è trasparenza esadecimale
              
              // Autoscale asse Y
              const min = Math.min(...chartData) - 2;
              const max = Math.max(...chartData) + 2;
              detailChart.options.scales.y.suggestedMin = min;
              detailChart.options.scales.y.suggestedMax = max;

              detailChart.update();
          }
      }
    </script>
  </body>
</html>
